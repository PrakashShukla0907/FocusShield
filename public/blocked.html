<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusShield – Work Mode</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      text-align: center;
      max-width: 340px;
      width: 90%;
      padding: 40px 32px 36px;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      display: block;
      border-radius: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    }

    .badge {
      display: inline-block;
      background: #f1f5f9;
      color: #475569;
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: #0f172a;
      margin-bottom: 8px;
    }

    .site-name {
      font-size: 16px;
      font-weight: 600;
      color: #4f46e5;
      margin-bottom: 6px;
      word-break: break-all;
    }

    .subtitle {
      font-size: 14px;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .hours-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 28px;
    }

    hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 0 0 24px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-primary {
      background: #0f172a;
      color: #ffffff;
      border: none;
      padding: 13px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }
    .btn-primary:hover { background: #1e293b; }

    .btn-secondary {
      background: transparent;
      color: #475569;
      border: 1px solid #cbd5e1;
      padding: 11px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      width: 100%;
    }
    .btn-secondary:hover { border-color: #94a3b8; color: #1e293b; }

    .clock {
      margin-top: 24px;
      font-size: 13px;
      color: #64748b;
    }
    #clock-display { font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <img id="shield-icon" class="icon" src="icons/icon_48x48.png" alt="FocusShield" />

    <div class="badge">⚡ Work Mode Active</div>

    <h1>Stay Focused.</h1>

    <div class="site-name" id="site-name">This site is blocked</div>
    <p class="subtitle">You set a work-hour rule for this site.<br>Come back when you're done.</p>

    <div class="hours-pill" id="work-hours-display">
      🕘 Loading schedule…
    </div>

    <hr />

    <div class="btn-group">
      <button class="btn-primary"  id="btn-back">← Go Back</button>
      <button class="btn-secondary" id="btn-newtab">Open New Tab</button>
    </div>

    <div class="clock">Now: <span id="clock-display">--:--</span></div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
